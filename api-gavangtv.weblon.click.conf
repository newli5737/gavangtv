server {
    server_name api-gavangtv.weblon.click;

    # HLS stream — serve segments directly via nginx (bypass Express for performance)
    location /hls/ {
        alias /home/ubuntu/gavangtv/server/public/hls/;

        # MIME types for HLS
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # CORS — allow all origins for HLS playback
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Origin' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range' always;

        # Cache .ts segments long, .m3u8 short
        location ~* \.ts$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin '*' always;
        }

        location ~* \.m3u8$ {
            expires -1;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin '*' always;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:4847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS headers
        add_header Access-Control-Allow-Origin 'https://gavangtv.weblon.click' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://gavangtv.weblon.click';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept';
            add_header Access-Control-Allow-Credentials 'true';
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api-gavangtv.weblon.click/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api-gavangtv.weblon.click/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api-gavangtv.weblon.click) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api-gavangtv.weblon.click;
    return 404; # managed by Certbot


}
