server {
    server_name gavangtv.weblon.click;

    # Frontend - Serve Vite build static files
    root /home/ubuntu/gavangtv/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/vnd.apple.mpegurl video/mp2t;
    gzip_min_length 256;

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HLS stream — serve segments directly from server/public/hls
    location /hls/ {
        alias /home/ubuntu/gavangtv/server/public/hls/;

        # MIME types for HLS
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # CORS
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Origin' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range' always;

        # Cache .ts segments long, .m3u8 short
        location ~* \.ts$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin '*' always;
        }

        location ~* \.m3u8$ {
            expires -1;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin '*' always;
        }
    }

    # API reverse proxy → Express backend
    location /api {
        proxy_pass http://127.0.0.1:4847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback — mọi route khác trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gavangtv.weblon.click/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gavangtv.weblon.click/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = gavangtv.weblon.click) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name gavangtv.weblon.click;
    return 404; # managed by Certbot


}
